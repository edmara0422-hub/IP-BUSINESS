<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EGE Business Splash Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #030303;
      --bg1: #070707;
      --bg2: #010101;
      --silver0: #ffffff;
      --silver1: #f7f8fa;
      --silver2: #d9dde3;
      --silver3: #8c9199;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Poppins", sans-serif;
      color: white;
      background:
        radial-gradient(circle at 50% 14%, rgba(255,255,255,.05), transparent 24%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 44%, var(--bg2) 100%);
    }

    .scene {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
      background-size: 96px 96px;
      mask-image: radial-gradient(circle at center, black 20%, transparent 88%);
      opacity: .22;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(56px);
      animation: drift 7s ease-in-out infinite;
    }

    .orb.left {
      left: -80px;
      top: 8%;
      width: 22rem;
      height: 22rem;
      background: radial-gradient(circle, rgba(255,255,255,.08) 0%, transparent 72%);
    }

    .orb.right {
      right: -80px;
      bottom: 10%;
      width: 20rem;
      height: 20rem;
      background: radial-gradient(circle, rgba(186,191,198,.1) 0%, transparent 72%);
      animation-duration: 7.6s;
      animation-direction: reverse;
    }

    .content {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      text-align: center;
    }

    .inner {
      width: min(1200px, 100%);
      animation: rise-in .75s cubic-bezier(.16,1,.3,1) both;
    }

    .line {
      width: min(26rem, 58vw);
      height: 1px;
      margin-inline: auto;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.1) 18%, rgba(255,255,255,.68) 50%, rgba(255,255,255,.1) 82%, transparent 100%);
      animation: line-breathe 4.2s ease-in-out infinite;
    }

    .line.top {
      margin-bottom: 28px;
      opacity: .32;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.08) 18%, rgba(255,255,255,.42) 50%, rgba(255,255,255,.08) 82%, transparent 100%);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 7.2vw, 6.2rem);
      letter-spacing: clamp(.16em, .28vw, .32em);
      line-height: 1;
      font-weight: 600;
      text-transform: uppercase;
      background: linear-gradient(180deg, var(--silver0) 0%, var(--silver1) 18%, var(--silver2) 42%, var(--silver3) 76%, #f2f4f7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 14px 34px rgba(255,255,255,.05);
      animation: title-breathe 3.8s ease-in-out infinite;
    }

    .loader {
      width: min(18rem, 52vw);
      margin: 40px auto 0;
    }

    .rail {
      position: relative;
      height: 3px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .fill {
      height: 100%;
      width: 100%;
      transform-origin: left center;
      background: linear-gradient(90deg, #7a7f86 0%, #ffffff 34%, #d7dbe1 70%, #7a7f86 100%);
      box-shadow: 0 0 18px rgba(255,255,255,.18);
      animation: fill 4.2s ease-in-out infinite;
    }

    @keyframes rise-in {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      0%, 100% { opacity: .08; transform: translate(0, 0); }
      50% { opacity: .16; transform: translate(20px, -10px); }
    }

    @keyframes title-breathe {
      0%, 100% { opacity: .92; }
      50% { opacity: 1; }
    }

    @keyframes line-breathe {
      0%, 100% { opacity: .22; transform: scaleX(.94); }
      50% { opacity: .64; transform: scaleX(1); }
    }

    @keyframes fill {
      0% { transform: scaleX(.08); }
      50% { transform: scaleX(.72); }
      80% { transform: scaleX(.92); }
      100% { transform: scaleX(1); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="orb left"></div>
    <div class="orb right"></div>

    <div class="content">
      <div class="inner">
        <div class="line top"></div>
        <h1>EGEBUSINESS</h1>
        <div class="line" style="margin-top:28px;"></div>
        <div class="loader">
          <div class="rail">
            <div class="fill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
