<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="chrome-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.92)" />
      <stop offset="16%" stop-color="rgba(219,225,232,0.38)" />
      <stop offset="42%" stop-color="rgba(96,101,108,0.95)" />
      <stop offset="100%" stop-color="rgba(14,15,18,0.98)" />
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)" />
    </linearGradient>
  </defs>
  <!-- Outer dark border -->
  <rect width="512" height="512" rx="115" fill="#0a0a0c" />
  <!-- Chrome gradient fill -->
  <rect x="8" y="8" width="496" height="496" rx="108" fill="url(#chrome-bg)" />
  <!-- Inner glow border -->
  <rect x="14" y="14" width="484" height="484" rx="102" fill="none" stroke="url(#border-glow)" stroke-width="2" />
  <!-- IPB text in white -->
  <text
    x="50%"
    y="53%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Poppins, Arial, Helvetica, sans-serif"
    font-size="155"
    font-weight="600"
    letter-spacing="50"
    fill="#ffffff"
  >
    IPB
  </text>
</svg>
